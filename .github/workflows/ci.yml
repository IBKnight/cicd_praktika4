name: CI/CD Pipeline

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest
        env:
          PYTHONPATH: .

  build-and-integration-test:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image (dev-тег)
        run: docker build -t myapp:dev .

      - name: Run docker-compose smoke test
        run: |
          docker compose up -d
          # Ждём до 30 секунд, пока порт станет доступен
          echo "Waiting for service to be ready..."
          for i in {1..30}; do
            if curl --fail --silent http://localhost:5000/ > /dev/null 2>&1; then
              echo "Service is up!"
              break
            fi
            echo "Attempt $i: not ready, retrying in 1s..."
            sleep 1
          done
          # Финальная проверка (если не ответил – упадёт)
          curl --fail http://localhost:5000/ || (docker compose logs && exit 1)
          docker compose down

      - name: Tag and push to Docker Hub
        run: |
          docker tag myapp:dev ${{ secrets.DOCKER_USERNAME }}/myapp:${{ github.sha }}
          docker tag myapp:dev ${{ secrets.DOCKER_USERNAME }}/myapp:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/myapp:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/myapp:latest

  deploy-to-k8s:
    needs: build-and-integration-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Create KinD cluster
        uses: helm/kind-action@v1.8.0
        with:
          cluster_name: myapp-cluster

      - name: Load Docker image into KinD
        run: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/myapp:${{ github.sha }}
          kind load docker-image ${{ secrets.DOCKER_USERNAME }}/myapp:${{ github.sha }} --name myapp-cluster

      - name: Deploy to KinD
        run: |
          sed -i "s|DOCKER_USERNAME|${{ secrets.DOCKER_USERNAME }}|g" k8s/deployment.yaml
          sed -i "s|IMAGE_TAG|${{ github.sha }}|g" k8s/deployment.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl rollout status deployment/myapp-deployment

      - name: Test service
        run: |
          kubectl port-forward svc/myapp-service 8080:80 &
          sleep 5
          curl --fail http://localhost:8080/